name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups --python 3.12

      - name: Lint
        run: |
          set +e
          uv run --python 3.12 ruff check . 2>&1 | tee ruff.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "### ruff failure"
              echo '```'
              tail -n 120 ruff.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            msg=$(tail -n 40 ruff.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=ruff failed::$msg"
            exit "$status"
          fi

      - name: Type check
        run: |
          set +e
          uv run --python 3.12 mypy src 2>&1 | tee mypy.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "### mypy failure"
              echo '```'
              tail -n 160 mypy.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            msg=$(tail -n 60 mypy.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=mypy failed::$msg"
            exit "$status"
          fi

      - name: Repo map artifact check
        run: |
          MAP_PATH=".devcouncil/repo_map.json"
          uv run --python 3.12 dev map --project-root . --output "$MAP_PATH" >/tmp/repo_map_first_stdout.txt
          cp "$MAP_PATH" /tmp/repo_map_first.json
          uv run --python 3.12 dev map --project-root . --output "$MAP_PATH" >/tmp/repo_map_second_stdout.txt
          if ! cmp -s /tmp/repo_map_first.json "$MAP_PATH"; then
            echo "::error title=repo map drift::Serialized map output is not stable. Re-run 'uv run dev map --project-root . --output .devcouncil/repo_map.json' and commit updates."
            diff -u /tmp/repo_map_first.json "$MAP_PATH" | tee /tmp/repo_map.diff
            exit 1
          fi
          if ! cmp -s /tmp/repo_map_first_stdout.txt /tmp/repo_map_second_stdout.txt; then
            echo "::error title=repo map drift::Map CLI output is not stable."
            diff -u /tmp/repo_map_first_stdout.txt /tmp/repo_map_second_stdout.txt | tee /tmp/repo_map.diff
            exit 1
          fi
          # Note: .devcouncil/repo_map.json, AGENTS.md, and CLAUDE.md are intentionally
          # gitignored local artifacts (regenerated by `dev map`), so a `git diff` drift
          # check on them is vacuous. Stability is enforced by the two cmp checks above.

      - name: Test
        run: |
          set +e
          uv run --python 3.12 pytest 2>&1 | tee pytest.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "### pytest failure"
              echo '```'
              tail -n 160 pytest.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            msg=$(tail -n 60 pytest.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=pytest failed::$msg"
            exit "$status"
          fi

      - name: Package smoke
        run: |
          npm pack --dry-run
          npm run smoke:wheel
          npm run smoke:package
