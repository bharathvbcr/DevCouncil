name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups --python 3.12

      - name: Lint
        run: |
          set +e
          uv run --python 3.12 ruff check . 2>&1 | tee ruff.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "### ruff failure"
              echo '```'
              tail -n 120 ruff.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            msg=$(tail -n 40 ruff.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=ruff failed::$msg"
            exit "$status"
          fi

      - name: Test
        run: |
          set +e
          uv run --python 3.12 pytest 2>&1 | tee pytest.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "### pytest failure"
              echo '```'
              tail -n 160 pytest.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            msg=$(tail -n 60 pytest.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=pytest failed::$msg"
            exit "$status"
          fi

      - name: Package smoke
        run: npm pack --dry-run
