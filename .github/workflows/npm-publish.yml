name: npm Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run checks
        run: |
          set +e
          uv run --python 3.12 ruff check . 2>&1 | tee ruff.log
          ruff_status=${PIPESTATUS[0]}
          uv run --python 3.12 mypy src 2>&1 | tee mypy.log
          mypy_status=${PIPESTATUS[0]}
          uv run --python 3.12 pytest 2>&1 | tee pytest.log
          pytest_status=${PIPESTATUS[0]}
          if [ "$ruff_status" -ne 0 ] || [ "$mypy_status" -ne 0 ] || [ "$pytest_status" -ne 0 ]; then
            {
              echo "### ruff tail"
              echo '```'
              tail -n 80 ruff.log
              echo '```'
              echo "### mypy tail"
              echo '```'
              tail -n 120 mypy.log
              echo '```'
              echo "### pytest tail"
              echo '```'
              tail -n 160 pytest.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            combined="$(tail -n 30 ruff.log; tail -n 60 mypy.log; tail -n 60 pytest.log)"
            msg=$(printf "%s" "$combined" | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=release checks failed::$msg"
            if [ "$ruff_status" -ne 0 ]; then
              exit "$ruff_status"
            fi
            if [ "$mypy_status" -ne 0 ]; then
              exit "$mypy_status"
            fi
            exit "$pytest_status"
          fi

      - name: Check npm package contents
        run: |
          npm run pack:check
          npm run smoke:wheel
          npm run smoke:package

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Publish package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
