# DevCouncil evidence workflow — verify, export artifacts, optional GitHub Check/comment.
# Generated by DevCouncil; adjust install/dev commands for your stack.
# Check conclusion fails only on blocking gaps; advisory gaps appear in artifacts/comments.
name: DevCouncil Evidence

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install DevCouncil
        run: uv sync --all-groups --python 3.12
      - name: DevCouncil verify (scoped diff)
        env:
          # pull_request → base branch SHA; push → previous commit (github.event.before).
          # New branch / first push: before is all zeros — skip verify (no diff base).
          VERIFY_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [ "$VERIFY_BASE" = "$ZERO_SHA" ]; then
            VERIFY_BASE=""
          fi
          if [ -n "$VERIFY_BASE" ]; then
            uv run --python 3.12 dev check --verify --base "$VERIFY_BASE" --persist --project-root .
          else
            echo "::notice::Skipping DevCouncil verify — no diff base (first push / new branch). Push again or open a PR for scoped verify."
            exit 0
          fi
      - name: Write evidence JSON artifact
        run: uv run --python 3.12 dev report --evidence-json .devcouncil/evidence.json --fail-on-blocking --project-root .
      - name: Write evidence HTML artifact
        run: uv run --python 3.12 dev report --evidence-html .devcouncil/evidence.html --fail-on-blocking --project-root .
      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devcouncil-evidence
          path: |
            .devcouncil/evidence.json
            .devcouncil/evidence.html
          if-no-files-found: error
      - name: Post GitHub Check (blocking gaps only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: uv run --python 3.12 dev report --github --fail-on-blocking --project-root .
      - name: Post PR comment (includes advisory gaps)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: uv run --python 3.12 dev report --github-pr-comment --fail-on-blocking --project-root .
