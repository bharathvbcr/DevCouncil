execution:
  default_executor: claude
  # The full unit suite takes ~20 min on CI runners; the 900s default
  # times out the evidence gate's --test command.
  command_timeout: 2400
  enforce_file_scope_pre_verify: true
  stop_gate:
    mode: assist
    check_claims: true
    verify_active_task: true
models:
  provider: openrouter
  roles:
    arbiter:
      model: qwen/qwen3-max
    critic_a:
      model: qwen/qwen3-max
    critic_b:
      model: qwen/qwen3-max
    implementation_reviewer:
      model: qwen/qwen3-max
    live_reviewer:
      model: qwen/qwen3-max
    native_agent:
      model: qwen/qwen3-max
    planner_a:
      model: qwen/qwen3-max
    planner_b:
      model: qwen/qwen3-max
    prompt_enhancer:
      model: qwen/qwen3-max
    spec_writer:
      model: qwen/qwen3-max
project:
  default_branch: main
  name: DevCouncil
  root: .
verification:
  diff_coverage:
    enforce: false
    measure: true
    min_ratio: 0.0
  rigor:
    acceptance_samples_on_hard: 2
    coarse_acceptance_proof: hard
    effort_heuristics: hard
    enabled: true
    enforce_coverage_on_hard: true
    extra_repair_attempts_on_hard: 1
    min_added_lines_per_planned_file: 5
    reviewer_required_on_hard: false
    stub_detection: hard
integrations:
  claude:
    enabled: true
    scope: local
    write_gate: true
    settings_path: .claude/settings.local.json
  cursor:
    enabled: true
    config_path: .cursor/mcp.json
    hooks_path: .cursor/hooks.json
  grok:
    enabled: true
    config_path: .grok/config.toml
    hooks_path: .grok/hooks/devcouncil.json
  opencode:
    enabled: false
    config_path: opencode.json
  antigravity:
    enabled: true
    mcp_config_path: .agents/mcp_config.json
  warp:
    enabled: true
    command: oz
    run_mode: local
    mcp_config_path: .devcouncil/integrations/warp-mcp.json
