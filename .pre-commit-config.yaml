repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
    -   id: ruff
        args: [ --fix ]
    -   id: ruff-format

-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
    -   id: mypy
        additional_dependencies: [pydantic, sqlmodel, typer, rich, httpx]

-   repo: local
    hooks:
    -   id: devcouncil-map-freshness
        name: devcouncil map --if-stale (repo map / code graph freshness)
        entry: devcouncil map --if-stale
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        verbose: false
